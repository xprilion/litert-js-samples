<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteRT-LM — Browser LLM Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    display: flex; flex-direction: column; align-items: center; padding: 1rem; min-height: 100vh;
  }
  h1 { font-size: 1.3rem; color: #7b46f6; }
  .subtitle { color: #888; font-size: 0.8rem; margin-bottom: 1rem; text-align: center; }

  .container { max-width: 640px; width: 100%; flex: 1; display: flex; flex-direction: column; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; background: #0f0f0f;
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }
  #loading-overlay.hidden { display: none; }
  #loading-overlay .loader-icon {
    width: 48px; height: 48px; border: 3px solid #2a2a2a; border-top-color: #7b46f6;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loading-stage { color: #e0e0e0; font-size: 0.95rem; margin-bottom: 0.3rem; }
  #loading-detail { color: #888; font-size: 0.78rem; margin-bottom: 1rem; text-align: center; max-width: 320px; }

  /* ── Progress bar ── */
  .progress-bar {
    width: 280px; height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .progress-fill {
    height: 100%; background: #7b46f6; border-radius: 3px;
    transition: width 0.3s ease; width: 0%;
  }
  .progress-fill.indeterminate {
    width: 40%; animation: slide 1.5s ease-in-out infinite;
  }
  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  #loading-hint { color: #555; font-size: 0.7rem; }

  /* ── Messages ── */
  #messages {
    flex: 1; overflow-y: auto; margin-bottom: 0.75rem;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .msg { max-width: 85%; padding: 0.6rem 0.9rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: #7b46f6; color: white; }
  .msg.assistant { align-self: flex-start; background: #1a1a1a; border: 1px solid #2a2a2a; }
  .msg.assistant.generating { border-color: #7b46f6; }

  .input-row { display: flex; gap: 0.5rem; }
  #input {
    flex: 1; padding: 0.6rem 0.8rem; border-radius: 10px; border: 1px solid #2a2a2a;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.9rem; font-family: inherit;
    outline: none;
  }
  #input:focus { border-color: #7b46f6; }
  #send {
    padding: 0.6rem 1.2rem; border-radius: 10px; border: none;
    background: #7b46f6; color: white; cursor: pointer; font-size: 0.9rem;
  }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }

  .back-link { color: #7b46f6; text-decoration: none; font-size: 0.75rem; margin-bottom: 0.5rem; }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<a class="back-link" href="../">← Back to Home</a>
<h1>LiteRT-LM Chat</h1>
<p class="subtitle">Gemma 4 E2B — running locally in your browser (WebGPU)</p>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loader-icon"></div>
  <div id="loading-stage">Initializing…</div>
  <div id="loading-detail"></div>
  <div class="progress-bar">
    <div id="progress-fill" class="progress-fill indeterminate"></div>
  </div>
  <div id="loading-hint"></div>
</div>

<div class="container">
  <div id="messages"></div>
  <div class="input-row">
    <input id="input" type="text" placeholder="Type a message…" disabled />
    <button id="send" disabled>Send</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "@litert-lm/core": "https://cdn.jsdelivr.net/npm/@litert-lm/core@0.14.0/dist/index.js",
    "@litertjs/wasm-utils": "https://cdn.jsdelivr.net/npm/@litertjs/wasm-utils@2.5.0/dist/index.js"
  }
}
</script>
<script type="module">
import { loadLiteRtLm, Engine, Backend } from '@litert-lm/core';

const MODEL_URL = 'https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm/resolve/main/gemma-4-E2B-it-web.litertlm';
const WASM_PATH = 'https://cdn.jsdelivr.net/npm/@litert-lm/core@0.14.0/wasm/';

const overlay = document.getElementById('loading-overlay');
const stageEl = document.getElementById('loading-stage');
const detailEl = document.getElementById('loading-detail');
const progressFill = document.getElementById('progress-fill');
const hintEl = document.getElementById('loading-hint');
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

let chat = null;
let loading = false;
let startTime = 0;

function updateLoading(stage, detail = '', progress = -1) {
  stageEl.textContent = stage;
  detailEl.textContent = detail;
  if (progress >= 0) {
    progressFill.classList.remove('indeterminate');
    progressFill.style.width = progress + '%';
  } else {
    progressFill.classList.add('indeterminate');
    progressFill.style.width = '';
  }
}

function hideOverlay() { overlay.classList.add('hidden'); }

function addMessage(role, content, generating = false) {
  const el = document.createElement('div');
  el.className = `msg ${role}${generating ? ' generating' : ''}`;
  el.textContent = content;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function elapsed() {
  const s = ((Date.now() - startTime) / 1000).toFixed(0);
  if (s < 60) return `${s}s`;
  return `${Math.floor(s/60)}m ${s%60}s`;
}

async function fetchWithProgress(url, onProgress) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const total = parseInt(resp.headers.get('content-length') || '0', 10);
  const reader = resp.body.getReader();
  const chunks = [];
  let loaded = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    loaded += value.length;
    if (total) onProgress(Math.round(loaded / total * 100), loaded, total);
  }

  const blob = new Blob(chunks);
  return { blob, total };
}

async function init() {
  startTime = Date.now();

  // Stage 1: Load WASM runtime (~20 MB)
  updateLoading('Loading WASM runtime', 'Downloading inference engine…');
  const litertLm = await loadLiteRtLm(WASM_PATH);

  // Stage 2: Download model with progress (~1.9 GB)
  updateLoading('Downloading model', 'Gemma 4 E2B (1.9 GB) — one-time download, cached by browser', 0);
  hintEl.textContent = 'Elapsed: 0s';

  const progressInterval = setInterval(() => {
    hintEl.textContent = `Elapsed: ${elapsed()}`;
  }, 1000);

  let modelBlob;
  try {
    const result = await fetchWithProgress(MODEL_URL, (pct, loaded, total) => {
      const loadedStr = (loaded / 1e6).toFixed(0) + ' MB';
      const totalStr = total ? (total / 1e9).toFixed(1) + ' GB' : '?';
      updateLoading('Downloading model', `${loadedStr} / ${totalStr}`, pct);
      hintEl.textContent = `Elapsed: ${elapsed()} · ${pct}%`;
    });
    modelBlob = result.blob;
  } finally {
    clearInterval(progressInterval);
  }

  // Stage 3: Compile & load model
  updateLoading('Loading model into memory', 'Compiling and optimizing for your device…', -1);
  hintEl.textContent = `Elapsed: ${elapsed()}`;

  let engine, backendLabel;
  try {
    engine = await Engine.create({ model: modelBlob, backend: Backend.GPU });
    backendLabel = 'WebGPU';
  } catch (e) {
    updateLoading('WebGPU unavailable, trying CPU', e.message, -1);
    engine = await Engine.create({ model: modelBlob, backend: Backend.CPU });
    backendLabel = 'CPU (WebAssembly)';
  }

  // Stage 4: Create chat session
  updateLoading('Starting chat session', 'Preparing conversation context…', -1);
  chat = await engine.createConversation({
    sessionConfig: {
      maxOutputTokens: 1024,
      samplerParams: { temperature: 0.7, topP: 0.95 },
    },
    preface: {
      messages: [{ role: 'system', content: 'You are a helpful, concise assistant. Keep responses brief.' }]
    }
  });

  hideOverlay();
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();

  addMessage('assistant', `Hi! I'm Gemma 4 E2B running entirely in your browser on ${backendLabel}. Ask me anything.`);
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || loading || !chat) return;
  loading = true;
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  const responseEl = addMessage('assistant', '', true);
  let fullText = '';

  try {
    const stream = chat.sendMessageStreaming(text);
    const reader = stream.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (value.content) {
        fullText += typeof value.content === 'string' ? value.content : '';
        responseEl.textContent = fullText;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }
  } catch (e) {
    responseEl.textContent = fullText || `Error: ${e.message}`;
  } finally {
    responseEl.classList.remove('generating');
    loading = false;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

init().catch(err => {
  updateLoading('Error', err.message, 0);
  hintEl.textContent = 'Check the console for details. Refresh to retry.';
  console.error(err);
});
</script>
</body>
</html>
