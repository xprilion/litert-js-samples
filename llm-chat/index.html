<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteRT-LM — Browser LLM Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    display: flex; flex-direction: column; align-items: center; padding: 1rem; min-height: 100vh;
  }
  h1 { font-size: 1.3rem; color: #7b46f6; }
  .subtitle { color: #888; font-size: 0.8rem; margin-bottom: 1rem; text-align: center; }

  .container { max-width: 640px; width: 100%; flex: 1; display: flex; flex-direction: column; }

  /* ── Model picker ── */
  .model-bar {
    display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.75rem;
    padding: 0.5rem 0.75rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
  }
  .model-bar label { font-size: 0.75rem; color: #888; white-space: nowrap; }
  #model-select {
    flex: 1; padding: 0.4rem 0.5rem; border-radius: 6px; border: 1px solid #2a2a2a;
    background: #0f0f0f; color: #e0e0e0; font-size: 0.8rem; font-family: inherit;
    outline: none; cursor: pointer;
  }
  #model-select:focus { border-color: #7b46f6; }
  #model-size { font-size: 0.7rem; color: #555; white-space: nowrap; }
  .model-bar.disabled { opacity: 0.4; pointer-events: none; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; background: #0f0f0f;
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }
  #loading-overlay.hidden { display: none; }
  #loading-overlay .loader-icon {
    width: 48px; height: 48px; border: 3px solid #2a2a2a; border-top-color: #7b46f6;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-stage { color: #e0e0e0; font-size: 0.95rem; margin-bottom: 0.3rem; }
  #loading-detail { color: #888; font-size: 0.78rem; margin-bottom: 1rem; text-align: center; max-width: 320px; }

  .progress-bar {
    width: 280px; height: 6px; background: #2a2a2a; border-radius: 3px; overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .progress-fill { height: 100%; background: #7b46f6; border-radius: 3px; transition: width 0.3s ease; width: 0%; }
  .progress-fill.indeterminate { width: 40%; animation: slide 1.5s ease-in-out infinite; }
  @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
  #loading-hint { color: #555; font-size: 0.7rem; }

  /* ── Messages ── */
  #messages {
    flex: 1; overflow-y: auto; margin-bottom: 0.75rem;
    display: flex; flex-direction: column; gap: 0.75rem;
  }
  .msg { max-width: 85%; padding: 0.6rem 0.9rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: #7b46f6; color: white; }
  .msg.assistant { align-self: flex-start; background: #1a1a1a; border: 1px solid #2a2a2a; }
  .msg.assistant.generating { border-color: #7b46f6; }
  .msg.system { align-self: center; font-size: 0.75rem; color: #555; text-align: center; padding: 0.4rem; }

  .input-row { display: flex; gap: 0.5rem; }
  #input {
    flex: 1; padding: 0.6rem 0.8rem; border-radius: 10px; border: 1px solid #2a2a2a;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.9rem; font-family: inherit;
    outline: none;
  }
  #input:focus { border-color: #7b46f6; }
  #send {
    padding: 0.6rem 1.2rem; border-radius: 10px; border: none;
    background: #7b46f6; color: white; cursor: pointer; font-size: 0.9rem;
  }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }

  .back-link { color: #7b46f6; text-decoration: none; font-size: 0.75rem; margin-bottom: 0.5rem; }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<a class="back-link" href="../">← Back to Home</a>
<h1>LiteRT-LM Chat</h1>
<p class="subtitle">Local LLM running in your browser — no server, no API keys</p>

<div class="container">
  <div id="model-bar" class="model-bar disabled">
    <label for="model-select">Model</label>
    <select id="model-select" disabled>
      <option value="">Select a model…</option>
    </select>
    <span id="model-size"></span>
  </div>

  <div id="messages"></div>
  <div class="input-row">
    <input id="input" type="text" placeholder="Type a message…" disabled />
    <button id="send" disabled>Send</button>
  </div>
</div>

<div id="loading-overlay">
  <div class="loader-icon"></div>
  <div id="loading-stage">Initializing…</div>
  <div id="loading-detail"></div>
  <div class="progress-bar">
    <div id="progress-fill" class="progress-fill indeterminate"></div>
  </div>
  <div id="loading-hint"></div>
</div>

<script type="importmap">
{
  "imports": {
    "@litert-lm/core": "https://cdn.jsdelivr.net/npm/@litert-lm/core@0.14.0/dist/index.js",
    "@litertjs/wasm-utils": "https://cdn.jsdelivr.net/npm/@litertjs/wasm-utils@2.5.0/dist/index.js"
  }
}
</script>
<script type="module">
import { loadLiteRtLm, Engine, Backend } from '@litert-lm/core';

const WASM_PATH = 'https://cdn.jsdelivr.net/npm/@litert-lm/core@0.14.0/wasm/';

// ── Model registry ──
const MODELS = [
  {
    id: 'qwen3-06b',
    name: 'Qwen3 0.6B (int4)',
    url: 'https://huggingface.co/litert-community/Qwen3-0.6B-int4/resolve/main/qwen3_0.6b_q4_block32_ekv1280.litertlm',
    size: 347251840,
    systemPrompt: 'You are Qwen, a helpful and concise assistant. Keep responses brief.',
  },
  {
    id: 'granite-350m',
    name: 'Granite 4.0 350M (q8)',
    url: 'https://huggingface.co/litert-community/granite-4.0-350m-litert-lm/resolve/main/granite-4.0-350m_q8_ekv1280.litertlm',
    size: 468209584,
    systemPrompt: 'You are Granite, an IBM language model. Be helpful and concise.',
  },
  {
    id: 'deepseek-15b',
    name: 'DeepSeek R1 Distill 1.5B (q8)',
    url: 'https://huggingface.co/litert-community/DeepSeek-R1-Distill-Qwen-1.5B/resolve/main/DeepSeek-R1-Distill-Qwen-1.5B_multi-prefill-seq_q8_ekv4096.litertlm',
    size: 1833451520,
    systemPrompt: 'You are DeepSeek R1, a reasoning model. Think step by step.',
  },
  {
    id: 'gemma-4-e2b',
    name: 'Gemma 4 E2B (web)',
    url: 'https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm/resolve/main/gemma-4-E2B-it-web.litertlm',
    size: 2008432640,
    systemPrompt: 'You are Gemma, a helpful and concise assistant. Keep responses brief.',
  },
];

// ── DOM ──
const overlay = document.getElementById('loading-overlay');
const stageEl = document.getElementById('loading-stage');
const detailEl = document.getElementById('loading-detail');
const progressFill = document.getElementById('progress-fill');
const hintEl = document.getElementById('loading-hint');
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const modelSelect = document.getElementById('model-select');
const modelSizeEl = document.getElementById('model-size');
const modelBar = document.getElementById('model-bar');

// ── State ──
let litertLm = null;       // WASM runtime (loaded once)
let engine = null;         // current engine
let chat = null;           // current conversation
let currentModelId = null; // which model is loaded
let modelBlob = null;      // cached blob (only one at a time)
let sending = false;
let startTime = 0;

// ── UI helpers ──
function updateLoading(stage, detail = '', progress = -1) {
  stageEl.textContent = stage;
  detailEl.textContent = detail;
  if (progress >= 0) {
    progressFill.classList.remove('indeterminate');
    progressFill.style.width = progress + '%';
  } else {
    progressFill.classList.add('indeterminate');
    progressFill.style.width = '';
  }
}
function showOverlay() { overlay.classList.remove('hidden'); }
function hideOverlay() { overlay.classList.add('hidden'); }

function addMessage(role, content, generating = false) {
  const el = document.createElement('div');
  el.className = `msg ${role}${generating ? ' generating' : ''}`;
  el.textContent = content;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}
function clearMessages() { messagesEl.innerHTML = ''; }

function formatSize(bytes) {
  if (bytes > 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
  return (bytes / 1e6).toFixed(0) + ' MB';
}
function elapsed() {
  const s = ((Date.now() - startTime) / 1000).toFixed(0);
  return s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;
}

// ── Progress fetch ──
async function fetchWithProgress(url, onProgress) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const total = parseInt(resp.headers.get('content-length') || '0', 10);
  const reader = resp.body.getReader();
  const chunks = [];
  let loaded = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    loaded += value.length;
    if (total) onProgress(Math.round(loaded / total * 100), loaded, total);
  }
  return new Blob(chunks);
}

// ── Cleanup (free memory) ──
async function cleanup() {
  if (chat) { try { await chat.delete(); } catch(e) {} chat = null; }
  if (engine) { try { await engine.delete(); } catch(e) {} engine = null; }
  // Free the blob — let GC collect it
  modelBlob = null;
  currentModelId = null;
}

// ── Load a model ──
async function loadModel(modelInfo) {
  startTime = Date.now();
  showOverlay();
  inputEl.disabled = true;
  sendBtn.disabled = true;
  modelBar.classList.add('disabled');

  // If switching models, clean up old one first
  if (currentModelId && currentModelId !== modelInfo.id) {
    updateLoading('Switching models', 'Freeing previous model from memory…', -1);
    await cleanup();
  }

  // Stage 1: WASM runtime (first time only)
  if (!litertLm) {
    updateLoading('Loading WASM runtime', 'Downloading inference engine (~20 MB)…');
    litertLm = await loadLiteRtLm(WASM_PATH);
  }

  // Stage 2: Download model (if not already the same one)
  if (currentModelId !== modelInfo.id) {
    const sizeLabel = formatSize(modelInfo.size);
    updateLoading('Downloading model', `${modelInfo.name} (${sizeLabel}) — cached after first load`, 0);
    hintEl.textContent = 'Elapsed: 0s';

    const progressInterval = setInterval(() => {
      hintEl.textContent = `Elapsed: ${elapsed()}`;
    }, 1000);

    try {
      modelBlob = await fetchWithProgress(modelInfo.url, (pct, loaded, total) => {
        updateLoading('Downloading model',
          `${(loaded/1e6).toFixed(0)} MB / ${formatSize(total || modelInfo.size)}`, pct);
        hintEl.textContent = `Elapsed: ${elapsed()} · ${pct}%`;
      });
    } finally {
      clearInterval(progressInterval);
    }
  }

  // Stage 3: Compile
  updateLoading('Loading model into memory', 'Compiling and optimizing…', -1);
  hintEl.textContent = `Elapsed: ${elapsed()}`;

  let backendLabel;
  try {
    engine = await Engine.create({ model: modelBlob, backend: Backend.GPU });
    backendLabel = 'WebGPU';
  } catch (e) {
    updateLoading('WebGPU unavailable, trying CPU…', e.message, -1);
    engine = await Engine.create({ model: modelBlob, backend: Backend.CPU });
    backendLabel = 'CPU (WASM)';
  }

  // Stage 4: Chat session
  updateLoading('Starting chat session', '…', -1);
  chat = await engine.createConversation({
    sessionConfig: {
      maxOutputTokens: 1024,
      samplerParams: { temperature: 0.7, topP: 0.95 },
    },
    preface: {
      messages: [{ role: 'system', content: modelInfo.systemPrompt }]
    }
  });

  currentModelId = modelInfo.id;
  hideOverlay();
  modelBar.classList.remove('disabled');
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();

  clearMessages();
  addMessage('system', `Loaded ${modelInfo.name} on ${backendLabel}`);
  setTimeout(() => inputEl.focus(), 100);
}

// ── Send message ──
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sending || !chat) return;
  sending = true;
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  const responseEl = addMessage('assistant', '', true);
  let fullText = '';

  try {
    const stream = chat.sendMessageStreaming(text);
    const reader = stream.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      if (value.content) {
        fullText += typeof value.content === 'string' ? value.content : '';
        responseEl.textContent = fullText;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }
  } catch (e) {
    responseEl.textContent = fullText || `Error: ${e.message}`;
  } finally {
    responseEl.classList.remove('generating');
    sending = false;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── Init model picker ──
function populateModelPicker() {
  modelSelect.innerHTML = '<option value="">— Choose a model —</option>';
  MODELS.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = `${m.name} (${formatSize(m.size)})`;
    modelSelect.appendChild(opt);
  });
  modelSelect.disabled = false;
  modelBar.classList.remove('disabled');
}

modelSelect.addEventListener('change', () => {
  const id = modelSelect.value;
  if (!id) return;
  const model = MODELS.find(m => m.id === id);
  if (!model) return;
  modelSizeEl.textContent = '';
  loadModel(model).catch(err => {
    updateLoading('Error', err.message, 0);
    hintEl.textContent = 'Check console. Refresh to retry.';
    console.error(err);
  });
});

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// ── Start ──
populateModelPicker();
addMessage('system', 'Choose a model above to begin. Models run entirely in your browser — no data leaves your device.');
modelSelect.focus();
</script>
</body>
</html>
