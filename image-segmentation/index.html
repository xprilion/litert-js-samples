<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteRT.js — Portrait Segmentation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    display: flex; flex-direction: column; align-items: center; padding: 1.5rem; min-height: 100vh;
  }
  h1 { font-size: 1.3rem; color: #7b46f6; }
  .subtitle { color: #888; font-size: 0.8rem; margin-bottom: 1rem; }
  .back { color: #7b46f6; text-decoration: none; font-size: 0.8rem; margin-bottom: 1rem; display: inline-block; }
  .back:hover { text-decoration: underline; }

  .container { max-width: 640px; width: 100%; }

  .status {
    background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 8px;
    padding: 0.6rem 0.8rem; margin-bottom: 0.75rem; font-size: 0.8rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .status.error { background: #2a1a1a; border-color: #4a2a2a; color: #f87171; }
  .status.success { background: #1a2a1a; border-color: #2a4a2a; color: #4ade80; }

  .canvas-row {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0;
  }
  .canvas-wrap { text-align: center; }
  .canvas-wrap .label { font-size: 0.7rem; color: #888; margin-top: 0.25rem; }
  canvas { border-radius: 8px; background: #111; max-width: 256px; }

  .upload-btn {
    display: inline-block; padding: 0.5rem 1rem; background: #7b46f6; color: white;
    border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-right: 0.5rem;
  }
  .upload-btn:hover { background: #6a35e5; }
  #image-input { display: none; }

  .effect-btn {
    padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
    background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; margin-right: 0.3rem;
  }
  .effect-btn.active { background: #7b46f6; border-color: #7b46f6; }
  .effect-btn:hover { background: #3a3a3a; }

  .slider-row {
    display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem;
  }
  .slider-row label { font-size: 0.75rem; color: #888; }
  .slider-row input { flex: 1; accent-color: #7b46f6; }

  #log { font-size: 0.7rem; color: #555; margin-top: 0.5rem; text-align: center; }
</style>
</head>
<body>

<a class="back" href="../">← All samples</a>
<h1>Portrait Segmentation</h1>
<p class="subtitle">Selfie Segmenter · Background Blur · 244 KB</p>

<div class="container">
  <div id="status" class="status">Initializing…</div>

  <div class="canvas-row">
    <div class="canvas-wrap">
      <canvas id="orig-canvas" width="256" height="256"></canvas>
      <div class="label">Original</div>
    </div>
    <div class="canvas-wrap">
      <canvas id="result-canvas" width="256" height="256"></canvas>
      <div class="label" id="result-label">Blurred Background</div>
    </div>
  </div>

  <div>
    <label class="upload-btn" for="image-input">📁 Upload Image</label>
    <input type="file" id="image-input" accept="image/*">
    <button class="effect-btn active" id="btn-blur">Blur</button>
    <button class="effect-btn" id="btn-bw">B&amp;W BG</button>
    <button class="effect-btn" id="btn-mask">Mask Only</button>
  </div>

  <div class="slider-row">
    <label>Blur:</label>
    <input type="range" id="blur-slider" min="1" max="20" value="8">
    <label id="blur-val">8px</label>
  </div>

  <div id="log"></div>
</div>

<script type="importmap">
{
  "imports": {
    "@litertjs/core": "https://cdn.jsdelivr.net/npm/@litertjs/core@2.5.3/dist/index.min.js",
    "@litertjs/wasm-utils": "https://cdn.jsdelivr.net/npm/@litertjs/wasm-utils@2.5.0/dist/index.min.js"
  }
}
</script>
<script type="module">
import { loadLiteRt, loadAndCompile, Tensor } from '@litertjs/core';

const MODEL_URL = 'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite';
const INPUT_SIZE = 256;

const el = (id) => document.getElementById(id);
const statusEl = el('status');
const logEl = el('log');
const origCanvas = el('orig-canvas');
const resultCanvas = el('result-canvas');
const origCtx = origCanvas.getContext('2d');
const resultCtx = resultCanvas.getContext('2d');
const resultLabel = el('result-label');

let currentModel = null;
let lastMask = null;
let currentMode = 'blur'; // 'blur' | 'bw' | 'mask'

function log(msg) { logEl.textContent = msg; console.log(msg); }
function setStatus(msg, cls = '') { statusEl.textContent = msg; statusEl.className = 'status ' + cls; }

// Preprocess: float32 input normalized to [0,1]
function preprocessImage(img) {
  origCtx.drawImage(img, 0, 0, INPUT_SIZE, INPUT_SIZE);
  const imageData = origCtx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
  const input = new Float32Array(1 * INPUT_SIZE * INPUT_SIZE * 3);
  for (let i = 0; i < INPUT_SIZE * INPUT_SIZE; i++) {
    input[i * 3]     = imageData.data[i * 4] / 255;
    input[i * 3 + 1] = imageData.data[i * 4 + 1] / 255;
    input[i * 3 + 2] = imageData.data[i * 4 + 2] / 255;
  }
  return input;
}

function applyBoxBlur(imageData, w, h, radius) {
  const src = new Uint8ClampedArray(imageData.data);
  const dst = new Uint8ClampedArray(src.length);
  const r = Math.max(1, Math.round(radius));
  
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let sr = 0, sg = 0, sb = 0, count = 0;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            const p = (ny * w + nx) * 4;
            sr += src[p]; sg += src[p+1]; sb += src[p+2];
            count++;
          }
        }
      }
      const p = (y * w + x) * 4;
      dst[p] = sr / count;
      dst[p+1] = sg / count;
      dst[p+2] = sb / count;
      dst[p+3] = 255;
    }
  }
  return new ImageData(dst, w, h);
}

function renderEffect(mask) {
  const imageData = origCtx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
  const blurred = applyBoxBlur(imageData, INPUT_SIZE, INPUT_SIZE, parseInt(el('blur-slider').value));
  const result = resultCtx.createImageData(INPUT_SIZE, INPUT_SIZE);

  for (let i = 0; i < INPUT_SIZE * INPUT_SIZE; i++) {
    const p = i * 4;
    const personConf = mask[i]; // 0-1 confidence of person

    if (currentMode === 'mask') {
      const v = Math.round(personConf * 255);
      result.data[p] = v;
      result.data[p+1] = v;
      result.data[p+2] = 255;
      result.data[p+3] = 255;
    } else if (currentMode === 'bw') {
      // Person in color, background in grayscale
      if (personConf > 0.5) {
        result.data[p] = imageData.data[p];
        result.data[p+1] = imageData.data[p+1];
        result.data[p+2] = imageData.data[p+2];
      } else {
        const gray = imageData.data[p] * 0.299 + imageData.data[p+1] * 0.587 + imageData.data[p+2] * 0.114;
        result.data[p] = result.data[p+1] = result.data[p+2] = gray;
      }
      result.data[p+3] = 255;
    } else {
      // Blur: person sharp, background blurred
      const alpha = Math.min(1, Math.max(0, (personConf - 0.3) / 0.4)); // smooth transition
      result.data[p]   = imageData.data[p] * alpha + blurred.data[p] * (1 - alpha);
      result.data[p+1] = imageData.data[p+1] * alpha + blurred.data[p+1] * (1 - alpha);
      result.data[p+2] = imageData.data[p+2] * alpha + blurred.data[p+2] * (1 - alpha);
      result.data[p+3] = 255;
    }
  }
  resultCtx.putImageData(result, 0, 0);
}

async function runInference(model, inputData) {
  setStatus('Running inference…');
  const inputTensor = new Tensor(inputData, [1, INPUT_SIZE, INPUT_SIZE, 3]);
  const startTime = performance.now();
  const results = await model.run(inputTensor);
  const elapsed = (performance.now() - startTime).toFixed(0);

  const outputData = await results[0].data(); // [1, 256, 256, 1]
  inputTensor.delete();
  results.forEach(r => r.delete());

  // Flatten to 256x256 confidence map
  const mask = new Float32Array(INPUT_SIZE * INPUT_SIZE);
  for (let i = 0; i < INPUT_SIZE * INPUT_SIZE; i++) {
    mask[i] = outputData[i];
  }

  lastMask = mask;
  renderEffect(mask);
  setStatus(`Done · ${elapsed}ms`, 'success');
  log(`Inference: ${elapsed}ms`);
}

// --- Init ---
async function init() {
  setStatus('Loading LiteRT.js WASM runtime…');
  const wasmPath = 'https://cdn.jsdelivr.net/npm/@litertjs/core@2.5.3/wasm/';
  await loadLiteRt(wasmPath);

  setStatus('Loading Selfie Segmenter model (~244KB)…');

  let model;
  try {
    model = await Promise.race([
      loadAndCompile(MODEL_URL, { accelerator: 'webgpu' }),
      new Promise((_, reject) => setTimeout(() => reject(new Error('WebGPU timeout')), 15000))
    ]);
  } catch (e) {
    setStatus(`WebGPU: ${e.message}, trying WASM…`);
    model = await loadAndCompile(MODEL_URL, { accelerator: 'wasm' });
  }

  currentModel = model;
  setStatus('Ready — upload an image', 'success');

  // Default image
  const img = new Image();
  img.onload = async () => {
    const inputData = preprocessImage(img);
    await runInference(model, inputData);
  };
  img.src = 'scene.jpg';
}

// Event handlers
el('image-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !currentModel) return;
  const img = new Image();
  img.onload = async () => {
    const inputData = preprocessImage(img);
    await runInference(currentModel, inputData);
  };
  img.src = URL.createObjectURL(file);
});

el('btn-blur').addEventListener('click', () => {
  currentMode = 'blur';
  el('btn-blur').classList.add('active');
  el('btn-bw').classList.remove('active');
  el('btn-mask').classList.remove('active');
  resultLabel.textContent = 'Blurred Background';
  if (lastMask) renderEffect(lastMask);
});

el('btn-bw').addEventListener('click', () => {
  currentMode = 'bw';
  el('btn-bw').classList.add('active');
  el('btn-blur').classList.remove('active');
  el('btn-mask').classList.remove('active');
  resultLabel.textContent = 'B&W Background';
  if (lastMask) renderEffect(lastMask);
});

el('btn-mask').addEventListener('click', () => {
  currentMode = 'mask';
  el('btn-mask').classList.add('active');
  el('btn-blur').classList.remove('active');
  el('btn-bw').classList.remove('active');
  resultLabel.textContent = 'Person Mask';
  if (lastMask) renderEffect(lastMask);
});

el('blur-slider').addEventListener('input', () => {
  el('blur-val').textContent = el('blur-slider').value + 'px';
  if (lastMask && currentMode === 'blur') renderEffect(lastMask);
});

init().catch(err => {
  setStatus(`Error: ${err.message}`, 'error');
  console.error(err);
});
</script>

</body>
</html>
